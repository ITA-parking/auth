services:
  postgres:
    image: postgres:18
    container_name: auth_service_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: public
    ports:
      - "6000:5432"
    volumes:
      - auth_service_data:/var/lib/postgresql

volumes:
  auth_service_data: